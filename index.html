      await sb.from('wc_predictions').delete().neq('id','00000000-0000-0000-0000-000000000000');
      await sb.from('wc_matches').delete().neq('id','00000000-0000-0000-0000-000000000000');
      await sb.from('wc_players').update({total_points:0}).neq('id','00000000-0000-0000-0000-000000000000');
      toast('All cleared','ok');renderPage();
    };
  };
  await renderPage();
}

async function recalcPoints(matchId,match){
  const sA=parseInt(match.score_a),sB=parseInt(match.score_b);
  const isKnockout=match.stage&&match.stage!=='group';
  const wentToPen=!!match.went_to_penalties;
  const wentToEt=!!match.went_to_et;
  let act; // actual match outcome for scoring: team_a / team_b / draw
  let winnerTeamName=null;
  if(isKnockout){
    if(wentToPen){
      // Decided by penalty shootout — use penalty_score_a/b to find winner
      const pA=parseInt(match.penalty_score_a),pB=parseInt(match.penalty_score_b);
      if(!isNaN(pA)&&!isNaN(pB)&&pA!==pB){
        act=pA>pB?'team_a':'team_b';
        winnerTeamName=pA>pB?match.team_a:match.team_b;
      }else{
        act=sA>sB?'team_a':sB>sA?'team_b':null; // fallback, shouldn't normally hit
      }
    }else{
      // Decided in 90 or 120 minutes — no draw possible in knockout
      act=sA>sB?'team_a':sB>sA?'team_b':null;
      winnerTeamName=sA>sB?match.team_a:(sB>sA?match.team_b:null);
    }
  }else{
    act=sA>sB?'team_a':sB>sA?'team_b':'draw';
    winnerTeamName=sA>sB?match.team_a:(sB>sA?match.team_b:null);
  }
  const {data:preds}=await sb.from('wc_predictions').select('*').eq('match_id',matchId);
  for(const pred of(preds||[])){
    const isCorrect=act!==null&&pred.prediction===act;
    // Exact score bonus always checks the regulation/full-time score (sA/sB), not penalties
    const bonus=pred.score_a===sA&&pred.score_b===sB;
    // Extra bonus point if knockout and player correctly called ET or Penalties
    let etPenBonus=false;
    if(isKnockout&&isCorrect){
      if(wentToPen&&pred.penalties)etPenBonus=true;
      else if(wentToEt&&!wentToPen&&pred.extra_time)etPenBonus=true;
    }
    const pts=(isCorrect?3:0)+(bonus?2:0)+(etPenBonus?1:0);
    await sb.from('wc_predictions').update({is_correct:isCorrect,bonus_correct:bonus,points_earned:pts}).eq('id',pred.id);
    const {data:allP}=await sb.from('wc_predictions').select('points_earned').eq('player_id',pred.player_id);
    await sb.from('wc_players').update({total_points:(allP||[]).reduce((a,b)=>a+b.points_earned,0)}).eq('id',pred.player_id);
    if(isCorrect){const {data:cb}=await sb.from('wc_predictions').select('id').eq('player_id',pred.player_id).eq('is_correct',true);if(cb?.length>=3)await sb.from('wc_badges').upsert({player_id:pred.player_id,badge_key:'hat_trick',badge_name:'Hat Trick',badge_name_ar:'هاتريك',badge_icon:'🎩'});}
    if(bonus)await sb.from('wc_badges').upsert({player_id:pred.player_id,badge_key:'exacto',badge_name:'Exacto',badge_name_ar:'المتقن',badge_icon:'📐'});
  }
  if(match.stage==='final'&&winnerTeamName){
    const {data:winners}=await sb.from('wc_players').select('id,total_points').eq('winner_pick',winnerTeamName);
    for(const w of(winners||[])){await sb.from('wc_players').update({total_points:w.total_points+50}).eq('id',w.id);await sb.from('wc_badges').upsert({player_id:w.id,badge_key:'oracle',badge_name:'The Oracle',badge_name_ar:'العراف',badge_icon:'🔮'});}
  }
}

    window.removeEmail=async function(id){await sb.from('wc_allowed_emails').delete().eq('id',id);toast('Removed','info');load();};
    window.dlEmailTpl=function(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['name,email\nAhmed Hassan,ahmed@gizaseeds.com'],{type:'text/csv'}));a.download='emails_template.csv';a.click();};
    window.uploadEmailCSV=async function(input){const text=await input.files[0].text();const rows=text.split('\n').slice(1).filter(r=>r.trim());let ok=0;for(const row of rows){const [n,e2]=row.split(',').map(c=>c.trim().replace(/"/g,''));if(!n||!e2)continue;const {error}=await sb.from('wc_allowed_emails').upsert({name:n,email:e2.toLowerCase()});if(!error)ok++;}toast('Added '+ok+' emails','ok');load();};
  };
  await load();

function dlCSV(data,filename){
  if(!data?.length)return;
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(r=>keys.map(k=>JSON.stringify(r[k]??'')).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}

// ── WEEKLY HERO ──
async function loadWeeklyHero(container){
  const heroEl=document.getElementById('weekly-hero');if(!heroEl)return;
  // Find match day with most recent finished matches
  const {data:recentDay}=await sb.from('wc_matches').select('match_day').eq('status','finished').order('match_day',{ascending:false}).limit(1).single();
  if(!recentDay)return;
  const day=recentDay.match_day;
  const {data:ms}=await sb.from('wc_matches').select('id').eq('match_day',day);
  if(!ms||!ms.length)return;
  const ids=ms.map(m=>m.id);
  const {data:preds}=await sb.from('wc_predictions').select('player_id,points_earned').in('match_id',ids);
  const {data:players}=await sb.from('wc_players').select('id,name').eq('is_disqualified',false);
  if(!preds||!players)return;
  const pts={};preds.forEach(p=>pts[p.player_id]=(pts[p.player_id]||0)+p.points_earned);
  const ranked=players.map(p=>({...p,dayPts:pts[p.id]||0})).sort((a,b)=>b.dayPts-a.dayPts);
  const hero=ranked[0];if(!hero||!hero.dayPts)return;
  heroEl.innerHTML='<div class="weekly-trophy">🏅</div>'+
    '<div><div style="font-size:11px;color:var(--g6);text-transform:uppercase;letter-spacing:1px">Match Day '+day+' Champion</div>'+
    '<div class="weekly-name">'+hero.name+'</div>'+
    '<div class="weekly-sub">'+hero.dayPts+' points that day</div></div>';
  heroEl.style.display='flex';
}

// ── HALL OF FAME ──
async function renderHallOfFame(container){
  container.innerHTML='<div class="admin-title" style="font-size:22px;margin-bottom:4px">🏛️ Hall of Fame</div>'+
    '<div style="font-size:13px;color:var(--g6);margin-bottom:20px">All-time records</div>'+
    '<div class="ball-loader"><div class="ball"></div></div>';
  const [{data:preds},{data:players},{data:matches}]=await Promise.all([
    sb.from('wc_predictions').select('*').limit(5000),
    sb.from('wc_players').select('id,name,total_points').eq('is_disqualified',false),
    sb.from('wc_matches').select('id,match_day,team_a,team_b,flag_a,flag_b').eq('status','finished')
  ]);
  if(!preds||!players)return;
  const getName=id=>(players.find(p=>p.id===id)||{name:'Unknown'}).name;
  // Most points in one match day
  const dayPts={};
  preds.forEach(pred=>{
    const m=matches.find(x=>x.id===pred.match_id);
    if(!m)return;
    const key=pred.player_id+'_'+m.match_day;
    dayPts[key]=(dayPts[key]||0)+(pred.points_earned||0);
  });
  const topDay=Object.entries(dayPts).sort((a,b)=>b[1]-a[1])[0];
  const topDayPlayer=topDay?getName(topDay[0].split('_')[0]):'—';
  const topDayPts=topDay?topDay[1]:0;
  const topDayNum=topDay?topDay[0].split('_')[1]:'—';
  // First exact score
  const firstExact=preds.filter(p=>p.bonus_correct).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at))[0];
  // Longest streak
  const allCorrect=preds.filter(p=>p.is_correct!==null).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const streaks={};let maxStreak=0,maxStreakPlayer='—';
  allCorrect.forEach(p=>{
    if(p.is_correct){streaks[p.player_id]=(streaks[p.player_id]||0)+1;if(streaks[p.player_id]>maxStreak){maxStreak=streaks[p.player_id];maxStreakPlayer=getName(p.player_id);}}
    else streaks[p.player_id]=0;
  });
  // Most exact scores
  const exactCounts={};preds.filter(p=>p.bonus_correct).forEach(p=>exactCounts[p.player_id]=(exactCounts[p.player_id]||0)+1);
  const topExact=Object.entries(exactCounts).sort((a,b)=>b[1]-a[1])[0];
  const records=[
    {icon:'⚡',title:'Most Points in One Match Day',value:topDayPts+' pts',holder:topDayPlayer+' (Day '+topDayNum+')'},
    {icon:'🎯',title:'First Ever Exact Score',value:firstExact?getName(firstExact.player_id):'—',holder:firstExact?new Date(firstExact.created_at).toLocaleDateString():''},
    {icon:'🔥',title:'Longest Correct Streak',value:maxStreak+' in a row',holder:maxStreakPlayer},
    {icon:'📐',title:'Most Exact Scores',value:topExact?(topExact[1]+' times'):'—',holder:topExact?getName(topExact[0]):'—'},
    {icon:'🏆',title:'All-Time Top Points',value:(players.sort((a,b)=>b.total_points-a.total_points)[0]?.total_points||0)+' pts',holder:players.sort((a,b)=>b.total_points-a.total_points)[0]?.name||'—'},
  ];
  container.innerHTML='<div class="admin-title" style="font-size:22px;margin-bottom:4px">🏛️ Hall of Fame</div>'+
    '<div style="font-size:13px;color:var(--g6);margin-bottom:20px">All-time records</div>'+
    records.map(r=>'<div class="hof-record"><div class="hof-icon">'+r.icon+'</div><div style="flex:1"><div style="font-weight:700;font-size:14px">'+r.title+'</div><div class="hof-desc">'+r.holder+'</div></div><div style="text-align:right"><div class="hof-val">'+r.value+'</div></div></div>').join('');
}

// ── TOURNAMENT STORY ──
async function renderTournamentStory(container){
  container.innerHTML='<div style="padding:20px"><div class="ball-loader"><div class="ball"></div></div></div>';
  const [{data:preds},{data:me},{data:matches}]=await Promise.all([
    sb.from('wc_predictions').select('*').eq('player_id',PLAYER.id).limit(500),
    sb.from('wc_players').select('*').eq('id',PLAYER.id).single(),
    sb.from('wc_matches').select('*').eq('status','finished')
  ]);
  if(!preds||!me)return;
  const finished=preds.filter(p=>p.is_correct!==null);
  const correct=finished.filter(p=>p.is_correct).length;
  const exact=preds.filter(p=>p.bonus_correct).length;
  const pct=finished.length?Math.round(correct/finished.length*100):0;
  // Best day
  const dayPts={};
  preds.forEach(pred=>{
    const m=matches.find(x=>x.id===pred.match_id);
    if(!m)return;
    dayPts[m.match_day]=(dayPts[m.match_day]||0)+(pred.points_earned||0);
  });
  const bestDay=Object.entries(dayPts).sort((a,b)=>b[1]-a[1])[0];
  // Biggest miss
  const bigMiss=preds.filter(p=>p.is_correct===false).map(p=>({...p,m:matches.find(x=>x.id===p.match_id)})).filter(p=>p.m)[0];
  container.innerHTML='<div class="story-card">'+
    '<div style="font-family:var(--font-display),sans-serif;font-size:26px;color:var(--gold);margin-bottom:4px">⚽ '+me.name+"'s World Cup Story</div>'"+
    '<div style="font-size:12px;color:var(--g6);margin-bottom:12px">Your personal tournament recap</div>'+
    '<div class="story-stat-row">'+
      '<div class="story-stat"><div class="story-stat-num">'+preds.length+'</div><div class="story-stat-lbl">Predictions</div></div>'+
      '<div class="story-stat"><div class="story-stat-num">'+correct+'</div><div class="story-stat-lbl">Correct</div></div>'+
      '<div class="story-stat"><div class="story-stat-num">'+pct+'%</div><div class="story-stat-lbl">Accuracy</div></div>'+
      '<div class="story-stat"><div class="story-stat-num">'+exact+'</div><div class="story-stat-lbl">Exact Scores</div></div>'+
      '<div class="story-stat"><div class="story-stat-num">'+me.total_points+'</div><div class="story-stat-lbl">Total Pts</div></div>'+
    '</div>'+
    (bestDay?'<div style="background:rgba(245,197,24,.1);border:1px solid var(--gold);border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px">⚡ Best day: <strong>Match Day '+bestDay[0]+'</strong> with <strong style="color:var(--gold)">'+bestDay[1]+' pts</strong></div>':'')+
    (bigMiss&&bigMiss.m?'<div style="background:rgba(229,62,62,.1);border:1px solid var(--err);border-radius:8px;padding:10px;font-size:13px">💔 Biggest miss: <strong>'+bigMiss.m.flag_a+' '+bigMiss.m.team_a+' vs '+bigMiss.m.flag_b+' '+bigMiss.m.team_b+'</strong></div>':'')+
    '</div>';
}
